<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2歳のおうち美術12ヶ月プラン</title>
  <style>
    :root {
      --bg: #faf8f5;
      --card: #ffffff;
      --line: #eee8e0;
      --text: #2d2018;
      --sub: #6a5a50;
      --muted: #a09080;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
        "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 72px;
    }

    .header {
      background: white;
      padding: 22px 20px 14px;
      border-bottom: 2px solid var(--line);
      box-shadow: 0 2px 16px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .eyebrow {
      font-size: 11px;
      color: #b0a090;
      letter-spacing: 0.14em;
      font-weight: 700;
      margin-bottom: 4px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .month-tabs {
      padding: 14px 16px 10px;
      overflow-x: auto;
      display: flex;
      gap: 7px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: white;
      border-bottom: 1px solid var(--line);
    }

    .month-tabs::-webkit-scrollbar {
      display: none;
    }

    .month-btn {
      flex: 0 0 auto;
      width: 54px;
      height: 54px;
      border-radius: 14px;
      border: 2px solid #e8e0d8;
      background: white;
      color: #8a7a70;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      padding: 0;
    }

    .month-btn.active {
      color: white;
      border-width: 3px;
    }

    .month-emoji {
      font-size: 16px;
      line-height: 1;
    }

    .month-num {
      font-size: 10px;
      margin-top: 2px;
      font-weight: 800;
    }

    .hero {
      margin: 16px;
      border-radius: 20px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      border: 2.5px solid;
    }

    .hero-emoji {
      position: absolute;
      top: -20px;
      right: -20px;
      font-size: 100px;
      opacity: 0.08;
      line-height: 1;
    }

    .hero-small {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      opacity: 0.8;
    }

    .hero-title {
      font-size: 26px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .hero-sub {
      font-size: 14px;
      color: var(--sub);
      font-weight: 600;
      margin-bottom: 14px;
    }

    .why-box {
      background: rgba(255,255,255,0.74);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: #4a3830;
      line-height: 1.8;
      border-left: 3px solid;
    }

    .section-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin: 0 16px 10px;
      text-transform: uppercase;
    }

    .activity {
      background: white;
      border: 2px solid;
      border-radius: 16px;
      margin: 0 16px 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .activity-head {
      width: 100%;
      padding: 14px 16px;
      background: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      transition: background 0.2s;
    }

    .activity-head.open {
      color: white;
    }

    .week-pill {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 900;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .activity-title-wrap {
      flex: 1;
      min-width: 0;
    }

    .activity-title {
      font-weight: 800;
      font-size: 15px;
      line-height: 1.25;
    }

    .activity-subline {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 500;
    }

    .toggle-mark {
      font-size: 18px;
      font-weight: 300;
      flex-shrink: 0;
    }

    .activity-body {
      padding: 0 16px 16px;
    }

    .meta-block {
      margin-top: 12px;
      margin-bottom: 10px;
    }

    .meta-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      border-radius: 999px;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 600;
    }

    .detail-box {
      font-size: 13px;
      color: #4a3830;
      line-height: 1.85;
      border-radius: 12px;
      padding: 12px 14px;
      border: 1px solid;
      margin-top: 10px;
    }

    .detail-row + .detail-row {
      margin-top: 10px;
    }

    .detail-k {
      font-weight: 800;
      display: block;
      margin-bottom: 2px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 16px 0;
      gap: 10px;
    }

    .nav button {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    @media (min-width: 700px) {
      body { max-width: 720px; margin: 0 auto; }
    }
  </style>
</head>

    let selectedMonth = 0;
    let expandedWeek = null;
    const startMonth = 4;

    function getDisplayMonth(index) {
      return ((index + startMonth - 1) % 12) + 1;
    }

    function render() {
      renderTabs();
      renderMonth();
    }

    function renderTabs() {
      const wrap = document.getElementById("monthTabs");
      wrap.innerHTML = months.map((m, i) => {
        const active = i === selectedMonth;
        return `
          <button
            class="month-btn ${active ? 'active' : ''}"
            style="
              background:${active ? m.accent : 'white'};
              border-color:${active ? m.accent : '#E8E0D8'};
              color:${active ? 'white' : '#8A7A70'};
            "
            onclick="selectMonth(${i})"
          >
            <span class="month-emoji">${m.emoji}</span>
            <span class="month-num">${getDisplayMonth(i)}月</span>
          </button>
        `;
      }).join("");
    }

    function renderMonth() {
      const m = months[selectedMonth];
      const app = document.getElementById("app");

      app.innerHTML = `
        <div
          class="hero"
          style="background:${m.light}; border-color:${m.color};"
        >
          <div class="hero-emoji">${m.emoji}</div>
          <div class="hero-small" style="color:${m.accent};">${getDisplayMonth(selectedMonth)}月のテーマ</div>
          <div class="hero-title" style="color:${m.accent};">${m.theme}</div>
          <div class="hero-sub">${m.sub}</div>
          <div class="why-box" style="border-left-color:${m.accent};">
            <strong>ねらい・背景</strong><br>
            ${m.why}
            <div style="margin-top:6px;font-size:11px;color:#8A7A70;">📚 ${m.basis}</div>
          </div>
        </div>

        <div class="section-label">週ごとのプラン</div>

        ${m.activities.map((act, i) => {
          const isOpen = expandedWeek === i;
          return `
            <div class="activity" style="border-color:${isOpen ? m.accent : m.color};">
              <button
                class="activity-head ${isOpen ? 'open' : ''}"
                onclick="toggleWeek(${i})"
                style="background:${isOpen ? m.accent : 'white'};"
              >
                <div
                  class="week-pill"
                  style="
                    background:${isOpen ? 'rgba(255,255,255,0.25)' : m.color};
                    color:${isOpen ? 'white' : m.accent};
                  "
                >
                  第${act.week}週
                </div>

                <div class="activity-title-wrap">
                  <div class="activity-title" style="color:${isOpen ? 'white' : '#2D2018'};">
                    ${act.title}
                  </div>
                  ${!isOpen ? `<div class="activity-subline">画材：${act.mat}</div>` : ``}
                </div>

                <div class="toggle-mark" style="color:${isOpen ? 'white' : m.accent};">
                  ${isOpen ? '−' : '+'}
                </div>
              </button>

              ${isOpen ? `
                <div class="activity-body">
                  <div class="meta-block">
                    <div class="meta-label">画材</div>
                    <div class="chips">
                      ${act.mat.split("・").map(item => `
                        <span class="chip" style="background:${m.color}; color:${m.accent};">${item}</span>
                      `).join("")}
                    </div>
                  </div>

                  <div class="meta-block">
                    <div class="meta-label">他に用意するもの</div>
                    <div class="detail-box" style="background:${m.light}; border-color:${m.color};">
                      ${act.tools}
                    </div>
                  </div>

                  <div class="detail-box" style="background:${m.light}; border-color:${m.color};">
                    <div class="detail-row">
                      <span class="detail-k">活動内容</span>
                      ${act.detail}
                    </div>
                    <div class="detail-row">
                      <span class="detail-k">意識したい点</span>
                      ${act.focus}
                    </div>
                    <div class="detail-row">
                      <span class="detail-k">参考文献・根拠</span>
                      ${act.ref}
                    </div>
                  </div>
                </div>
              ` : ``}
            </div>
          `;
        }).join("")}

        <div class="nav">
          <button
            onclick="moveMonth(-1)"
            ${selectedMonth === 0 ? "disabled" : ""}
            style="
              border:2px solid #E0D8D0;
              background:${selectedMonth === 0 ? '#F5F0EC' : 'white'};
              color:${selectedMonth === 0 ? '#C0B8B0' : '#4A3830'};
              cursor:${selectedMonth === 0 ? 'default' : 'pointer'};
            "
          >
            ← ${selectedMonth > 0 ? `${getDisplayMonth(selectedMonth - 1)}月` : ""}
          </button>

          <button
            onclick="moveMonth(1)"
            ${selectedMonth === 11 ? "disabled" : ""}
            style="
              border:2px solid ${selectedMonth < 11 ? months[selectedMonth + 1].accent : '#E0D8D0'};
              background:${selectedMonth === 11 ? '#F5F0EC' : months[selectedMonth + 1].light};
              color:${selectedMonth === 11 ? '#C0B8B0' : months[selectedMonth + 1].accent};
              cursor:${selectedMonth === 11 ? 'default' : 'pointer'};
            "
          >
            ${selectedMonth < 11 ? `${getDisplayMonth(selectedMonth + 1)}月 →` : ""}
          </button>
        </div>
      `;
    }

    function selectMonth(i) {
      selectedMonth = i;
      expandedWeek = null;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function toggleWeek(i) {
      expandedWeek = expandedWeek === i ? null : i;
      renderMonth();
    }

    function moveMonth(delta) {
      const next = selectedMonth + delta;
      if (next < 0 || next > 11) return;
      selectedMonth = next;
      expandedWeek = null;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    render();
  </script>
